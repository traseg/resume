<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
  <h3 class="text-3xl font-bold mb-12 flex items-center">
    <span class="text-brand-400 mr-3 font-mono text-xl">01.</span>
    {{ .Title }}
    <div class="h-px bg-slate-700 flex-grow ml-6"></div>
  </h3>

  <div class="grid md:grid-cols-2 gap-12 items-center">
    <div class="text-slate-400 space-y-4 text-lg leading-relaxed">
      {{ .Content }}
    </div>
    <div class="relative group max-w-sm mx-auto w-full">
      <div
        class="aspect-square rounded-xl bg-slate-700 relative z-10 overflow-hidden border-2 border-slate-600 transition-all duration-300 group-hover:border-brand-400 group-hover:-translate-y-2 group-hover:-translate-x-2"
      >
        <div
          class="w-full h-full flex items-center justify-center text-slate-500"
        >
          {{ with index (.Resources.ByType "image") 0 }} {{ with . }}
          <img
            src="{{ .RelPermalink }}"
            width="{{ .Width }}"
            height="{{ .Height }}"
            alt=""
          />
          {{ end }} {{ end }}
        </div>
      </div>
      <div
        class="absolute inset-0 border-2 border-brand-400 rounded-xl z-0 translate-x-5 translate-y-5 transition-all duration-300 group-hover:translate-x-3 group-hover:translate-y-3"
      ></div>
    </div>
  </div>
</div>
