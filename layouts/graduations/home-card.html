<div
  class="glass-card rounded-xl overflow-hidden hover:-translate-y-2 transition-transform duration-300 group"
>
  <div
    class="h-48 bg-slate-800 flex items-center justify-center border-b border-white/5 relative overflow-hidden"
  >
    <div
      class="absolute inset-0 bg-brand-500/20 group-hover:bg-transparent transition-colors duration-300 z-10"
    ></div>
    {{ with index (where .Resources "MediaType.SubType" "svg") 0 }}
      {{ .Content | safeHTML }}
    {{ end }}
  </div>
  <div class="p-6">
    <div class="flex justify-between items-center mb-4">
      <span class="text-brand-400 font-mono text-sm">{{ .Params.genre }}</span>
    </div>
    <h4 class="text-xl font-bold mb-2 group-hover:text-brand-400 transition-colors">
      {{ .Title }}
    </h4>
    {{ .Content }}
  </div>
</div>
